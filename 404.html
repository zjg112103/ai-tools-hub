<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 | AI 工具箱</title>
    <meta name="description" content="抱歉，您访问的页面不存在。返回 AI 工具箱首页，发现最好的 AI 工具。">
    <meta name="robots" content="noindex, follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="页面未找到 | AI 工具箱">
    <meta property="og:url" content="https://my-ai-tools-hub.netlify.app/404.html">
    <meta property="og:site_name" content="AI 工具箱">
    <meta name="twitter:card" content="summary">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        :root{--bg-deep:#0f1117;--bg-card:#1a1c26;--border:rgba(255,255,255,0.08);--text-primary:#f0f0f5;--text-secondary:#9a9ab0;--text-muted:#5e5e78;--accent:#6c5ce7;--gradient-1:linear-gradient(135deg,#6c5ce7,#a29bfe);--radius:16px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans SC','Outfit',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column}
        .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 600px 400px at 50% 40%,rgba(108,92,231,0.15),transparent)}
        .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:60px 60px}
        .navbar{position:sticky;top:0;z-index:100;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(15,17,23,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
        .logo{display:flex;align-items:center;gap:10px;font-family:'Outfit';font-weight:700;font-size:20px;color:var(--text-primary);text-decoration:none}
        .logo-icon{width:32px;height:32px;background:var(--gradient-1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
        .main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
        .error-code{font-family:'Outfit';font-size:120px;font-weight:800;background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:16px}
        .error-title{font-family:'Outfit';font-size:24px;font-weight:700;margin-bottom:12px}
        .error-desc{font-size:16px;color:var(--text-secondary);margin-bottom:32px;max-width:400px;line-height:1.6}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border-radius:12px;background:var(--gradient-1);color:white;font-size:15px;font-weight:600;text-decoration:none;transition:all 0.2s}
        .btn:hover{opacity:0.9;transform:translateY(-2px)}
        .search-box{margin-top:24px;display:flex;gap:8px}
        .search-box input{padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:14px;width:280px;outline:none}
        .search-box input::placeholder{color:var(--text-muted)}
        .search-box input:focus{border-color:var(--accent)}
        .footer{position:relative;z-index:1;text-align:center;padding:24px;border-top:1px solid var(--border);color:var(--text-muted);font-size:13px}
        @media(max-width:768px){.error-code{font-size:80px}.error-title{font-size:20px}.search-box input{width:200px}}
    </style>
</head>
<body>
<div class="bg-mesh"></div><div class="bg-grid"></div>
<nav class="navbar"><a href="index.html" class="logo"><div class="logo-icon">⚡</div><span>AI 工具箱</span></a></nav>
<div class="main">
    <div class="error-code">404</div>
    <div class="error-title">页面走丢了</div>
    <div class="error-desc">你访问的页面不存在，可能已被移动或删除。试试返回首页，或者搜索你想找的工具。</div>
    <a href="index.html" class="btn">← 返回首页</a>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索 AI 工具…" onkeydown="if(event.key==='Enter')doSearch()">
    </div>
</div>
<footer class="footer"><p>© 2026 AI 工具箱 · <a href="index.html" style="color:var(--text-secondary);text-decoration:none">返回首页</a></p></footer>
<script>
function doSearch(){var q=document.getElementById('searchInput').value.trim();if(q)window.location.href='index.html?q='+encodeURIComponent(q)}
</script>
</body>
</html>
